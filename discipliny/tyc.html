<!DOCTYPE html>
<html lang="cs">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Skok o tyči</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="tyc.css">

</head>

<body>

<header class="page-header">

    <a href="../index.html" class="back-button">
        ← Zpět
    </a>

    <h1>Skok o tyči</h1>

</header>



<section class="sector-photo">

    <img src="../images/sectors/tyc.jpg"
         alt="Správně připravený sektor skoku o tyči">

</section>



<section class="equipment">

    <h2>Seznam pomůcek</h2>



    <!-- ŠATLAVA -->

    <div class="location">

        <h3>📍 Šatlava</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Měřicí zařízení</span>
        </label>

        <label class="check-item">
            <input type="checkbox">
            <span>Praporky (bílý, červený, žlutý)</span>
        </label>

        <label class="check-item">
            <input type="checkbox">
            <span>Značky pro rozběh závodníků</span>
        </label>

        <label class="check-item">
            <input type="checkbox">
            <span>Praporek na vítr</span>
        </label>

    </div>



    <!-- CHODBA -->

    <div class="location">

        <h3>📍 Chodba</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Molitany k doskočišti</span>
        </label>

        <label class="check-item">
            <input type="checkbox">
            <span>Laťka</span>
        </label>

    </div>



    <!-- SKLAD Č. 3 -->

    <div class="location">

        <h3>📍 Sklad č. 3</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Stůl a židle</span>
        </label>

    </div>



    <!-- SPRÁVCE -->

    <div class="location">

        <h3>📍 Správce</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Stan</span>
        </label>

    </div>



    <!-- SKLAD V BUDOVĚ -->

    <div class="location">

        <h3>📍 Sklad v budově (110 m)</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Informační tabule</span>
        </label>

    </div>



    <!-- ŠATNY -->

    <div class="location">

        <h3>📍 Šatny</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Lavičky pro závodníky</span>
        </label>

    </div>

</section>



<section class="notes">

    <h2>Poznámky</h2>

    <ul>

        <li>Doplň podle potřeby.</li>

    </ul>

</section>
<script src="../checkboxes.js"></script>
</body>

</html>
