<!DOCTYPE html>
<html lang="cs">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Běhy a chůze</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="behy.css">

</head>

<body>

<header class="page-header">

    <a href="../index.html" class="back-button">
        ← Zpět
    </a>

    <h1>Běhy a chůze</h1>

</header>



<section class="sector-photo">

    <img src="../images/sectors/behy.jpg"
         alt="Správně připravený sektor běhů a chůze">

</section>



<section class="equipment">

    <h2>Seznam pomůcek</h2>



    <!-- SKLAD V BUDOVĚ -->

    <div class="location">

        <h3>📍 Sklad v budově (110 m)</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Závodní bloky</span>
        </label>

        <label class="check-item">
            <input type="checkbox">
            <span>Ukazatel kol se zvonkem</span>
        </label>

    </div>



    <!-- KLEC VEDLE 110 m -->

    <div class="location">

        <h3>📍 Klec vedle 110 m</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Závodní překážky</span>
        </label>

    </div>



    <!-- SKLAD (BOLT) -->

    <div class="location">

        <h3>📍 Sklad (Bolt)</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Bílá tabule pro chodecké závody</span>
        </label>

    </div>

</section>



<section class="notes">

    <h2>Poznámky</h2>

    <ul>

        <li>Doplň podle potřeby.</li>

    </ul>

</section>
