<!DOCTYPE html>
<html lang="cs">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Kladivo</title>

    <!-- Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="kladivo.css">

</head>

<body>


<!-- ===================================================== -->
<!--                    HORNÍ PANEL                         -->
<!-- ===================================================== -->

<header class="top-panel">

    <a href="../index.html"
       class="back-button">

        <svg
            class="back-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none">

            <path
                d="M15 18L9 12L15 6"
                stroke="currentColor"
                stroke-width="2.8"
                stroke-linecap="round"
                stroke-linejoin="round"/>

        </svg>

    </a>

    <div class="top-card">

        <!-- ===== POČÍTADLO ===== -->

        <div class="progress-box">

            <span class="progress-number">
                0 / 10
            </span>

        </div>

        <!-- ===== LOGO ===== -->

        <div class="logo-box">

            <img
                src="../images/logo/logo.png"
                alt="Technická četa"
                class="progress-logo">

        </div>

        <!-- ===== GALERIE ===== -->
<div class="gallery-box">

   <button
        class="gallery-button"
    id="galleryButton"
    data-gallery="../images/sectors/kladivo/"
    data-count="1"
    aria-label="Otevřít galerii">

    <svg
        class="gallery-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round">

        <path d="M15 8h.01"/>
        <path d="M3 6a3 3 0 0 1 3 -3h12a3 3 0 0 1 3 3v12a3 3 0 0 1 -3 3h-12a3 3 0 0 1 -3 -3v-12"/>
        <path d="M3 16l5 -5c.928 -.893 2.072 -.893 3 0l5 5"/>
        <path d="M14 14l1 -1c.928 -.893 2.072 -.893 3 0l3 3"/>

    </svg>

</button>

</div>

</header>


<!-- ===================================================== -->
<!--                SEZNAM POMŮCEK                          -->
<!-- ===================================================== -->

<section class="equipment">
 
     <!-- ŠATLAVA -->

    <div class="location">

        <h3>📍 Šatlava</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Závodní náčiní určité váhy</span>
        </label>

        <label class="check-item">
            <input type="checkbox">
            <span>Měřicí pásmo</span>
        </label>

        <label class="check-item">
            <input type="checkbox">
            <span>Praporky (bílý, červený, žlutý)</span>
        </label>

        <label class="check-item">
            <input type="checkbox">
            <span>Značky pro změření výkonu</span>
        </label>

    </div>


    <!-- SKLAD Č. 3 -->

    <div class="location">

        <h3>📍 Sklad č. 3</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Stůl a židle</span>
        </label>

    </div>


    <!-- SPRÁVCE -->

    <div class="location">

        <h3>📍 Správce</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Stan</span>
        </label>

    </div>


    <!-- ŠATNY -->

    <div class="location">

        <h3>📍 Šatny</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Lavičky pro závodníky</span>
        </label>

    </div>


</section>


<!-- ===================================================== -->
<!--                     POZNÁMKY                           -->
<!-- ===================================================== -->

<section class="notes">

    <h2>Poznámky</h2>

    <p>Doplň podle potřeby.</p>

</section>

<div id="galleryDots" class="gallery-dots"></div>

<script src="../checkboxes.js"></script>

<link
    rel="stylesheet"
    href="../libs/photoswipe/photoswipe.css">

<script type="module"
        src="../js/gallery.js"></script>

</body>

</html>
