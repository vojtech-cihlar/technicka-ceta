<!DOCTYPE html>
<html lang="cs">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Skok vysoký</title>

    <!-- Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="vyska.css">

</head>

<body>



<!-- ========================================= -->
<!--                HLAVIČKA                    -->
<!-- ========================================= -->

<a href="../index.html" class="back-button">

    <svg
        class="back-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none">

        <path
            d="M15 18L9 12L15 6"
            stroke="currentColor"
            stroke-width="2.8"
            stroke-linecap="round"
            stroke-linejoin="round"/>

    </svg>

</a>



<!-- ========================================= -->
<!--           FOTKA SEKTORU                    -->
<!-- ========================================= -->

<section class="sector-top">

    <div class="progress-box">

    <img
        src="../images/logo/logo.png"
        alt="Technická četa"
        class="progress-logo">

    <span class="progress-number">0 / 10</span>

</div>

    <div class="sector-photo">

        <img src="../images/sectors/vyska.jpg"
             alt="Správně připravený sektor skoku vysokého">

    </div>

</section>



<!-- ========================================= -->
<!--             SEZNAM POMŮCEK                -->
<!-- ========================================= -->

<section class="equipment">

    



    <!-- ŠATLAVA -->

    <div class="location">

        <h3>📍 Šatlava</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Měřicí zařízení</span>
        </label>

        <label class="check-item">
            <input type="checkbox">
            <span>Praporky (bílý, červený, žlutý)</span>
        </label>

        <label class="check-item">
            <input type="checkbox">
            <span>Značky pro rozběh závodníků</span>
        </label>

    </div>



    <!-- SKLAD Č.3 -->

    <div class="location">

        <h3>📍 Sklad č. 3</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Stůl a židle</span>
        </label>

    </div>



    <!-- CHODBA -->

    <div class="location">

        <h3>📍 Chodba</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Laťka</span>
        </label>

    </div>



    <!-- SKLAD 110 -->

    <div class="location">

        <h3>📍 Sklad v budově (110 m)</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Stojany</span>
        </label>

        <label class="check-item">
            <input type="checkbox">
            <span>Informační tabule</span>
        </label>

    </div>



    <!-- SPRÁVCE -->

    <div class="location">

        <h3>📍 Správce</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Stan</span>
        </label>

    </div>



    <!-- ŠATNY -->

    <div class="location">

        <h3>📍 Šatny</h3>

        <label class="check-item">
            <input type="checkbox">
            <span>Lavičky pro závodníky</span>
        </label>

    </div>

</section>



<!-- ========================================= -->
<!--               POZNÁMKY                     -->
<!-- ========================================= -->

<section class="notes">

    <h2>Poznámky</h2>

    <p>Doplň podle potřeby.</p>

</section>
<script src="../checkboxes.js"></script>
</body>

</html>
